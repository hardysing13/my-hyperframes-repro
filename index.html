<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="hf-config" content="staticDuration=30">
    <script src="jsdelivr.net"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0a1628; }
      
      #root { 
        width: 1920px; 
        height: 1080px; 
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #0a1628;
      }
      
      .spacer-top { height: 250px; width: 100%; }
      .spacer-middle { height: 60px; width: 100%; }
      .spacer-bottom { height: 100px; width: 100%; }

      #timer { 
        font-family: monospace; 
        font-size: 200px; 
        color: #ffffff; 
        height: 240px;
        line-height: 240px;
        text-align: center;
      }
      
      .label-wrapper {
        width: 1920px;
        height: 60px;
        position: relative;
      }

      .label-text { 
        font-family: monospace; 
        font-size: 40px; 
        width: 100%;
        text-align: center;
        position: absolute;
        top: 0;
        left: 0;
      }

      #label-before { color: #ffb436; opacity: 1; }
      #label-after { color: #ff4444; opacity: 0; }
      
      #bar { width: 1600px; height: 8px; background: #1a2a3a; }
      #fill { height: 8px; background: #ffb436; width: 0%; }
    </style>
  </head>
  <body>
    <div id="root"
      data-composition-id="gemini"
      data-start="0"
      data-duration="30"
      data-width="1920"
      data-height="1080"
    >
      <div class="spacer-top"></div>
      <div id="timer">0:00</div>
      
      <div class="spacer-middle"></div>
      <div class="label-wrapper">
        <div id="label-before" class="label-text">WATCHING FOR SHIFT...</div>
        <div id="label-after" class="label-text">12s MARK — WATCH FOR SHIFT</div>
      </div>

      <div class="spacer-bottom"></div>
      <div id="bar"><div id="fill"></div></div>
    </div>
    
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        window.__timelines = window.__timelines || {};
        gsap.defaults({ ease: "none" });

        const tl = gsap.timeline({ paused: true });
        const timerEl = document.getElementById("timer");
        const timeTracker = { rawTime: 0 };

        tl.to("#fill", { width: "100%", duration: 30 }, 0);

        tl.to("#label-before", { opacity: 0, duration: 0.001 }, 12);
        tl.to("#label-after", { opacity: 1, duration: 0.001 }, 12);

        tl.to(timeTracker, {
          rawTime: 30,
          duration: 30,
          onUpdate: function() {
            const currentSeconds = Math.floor(timeTracker.rawTime);
            timerEl.textContent = "0:" + String(currentSeconds).padStart(2, "0");
          }
        }, 0);

        // FIX: Dot notation syntax explicitly satisfies static compiler linter format rules
        window.__timelines.gemini = tl;
      });
    </script>
  </body>
</html>
